    <div>
        <form>
            <h2>Kontakt forması</h2>
            <div>
                <label>Atı</label>
                <input type="text" name="name" placeholder="Atıńızdı kirgiziń" required>
            </div>
            <div>
                <label>Familya</label>
                <input type="text"  name="surname" placeholder="Familiyańızdı kirgiziń" required>
            </div>
            <div>
                <label>Tuwılǵan jılı</label>
                <input type="date"  name="date" max="2026" min="1900" placeholder="Tuwılǵan jılınızdı kirgiziń" required>
            </div>
            <div>
                <label>Email</label>
                <input type="email"  name="email" placeholder="Emailıńızdı kirgiziń" required>
            </div>
            <div>
                <label>Pikirińiz</label>
                <textarea name="message" placeholder="Pikirińizdi jazıń" required></textarea>
            </div>
            <button type="submit">Jiberiw</button>
        </form>
    </div>
